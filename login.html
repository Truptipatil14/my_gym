
<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            width: 400px;
        }

        .nav-tabs .nav-link.active {
            background-color: #4facfe;
            color: white;
        }

        .btn-custom {
            background-color: #4facfe;
            color: white;
        }

        .btn-custom:hover {
            background-color: #00c6ff;
        }

        .register-link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="login-container">

    <ul class="nav nav-tabs" id="loginTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#user">User</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#trainer">Trainer</button>
        </li>
    </ul>

    <div class="tab-content mt-3">

        <!-- User Login -->
        <div class="tab-pane fade show active" id="user">
            <h4 class="text-center">User Login</h4>
            <form action="login.php" method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Enter Name" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>
                <button name="user_login" class="btn btn-custom w-100">Login</button>
            </form>
        </div>

        <!-- Trainer Login -->
        <div class="tab-pane fade" id="trainer">
            <h4 class="text-center">Trainer Login</h4>
            <form action="login.php" method="POST">
                <input type="text" name="trainername" class="form-control mb-3" placeholder="Trainer Name" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <button name="trainer_login" class="btn btn-custom w-100">Login</button>
            </form>
        </div>

    </div>

    <div class="register-link">
        <a href="register.html">New User? Register Here</a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
