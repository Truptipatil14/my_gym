<!DOCTYPE html> 
 <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>User Registration</title>   


    
<style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        width: 300px;
    }

    h2 {
        text-align: center;
    }

    input, select {
        width: 300px;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 300px;
        padding: 10px;
        background: #4facfe;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #00c6ff;
    }
</style>


</style>

      </head>  
<body>  
    <center>

    <h2>User Registration</h2> 
     <form action="register.php" method="POST">  
    <label for="username">Username:</label><br>  
    <input type="text" id="username" name="username" placeholder="Enter Username" required><br><br>  <label for="age">Age:</label><br> 

<input type="number" id="age" name="age" placeholder="Enter Age" min="1" required><br><br>  
<label for="weight">Weight (kg):</label><br>  
<input type="number" step="0.1" id="weight" name="weight" placeholder="Enter Weight" required><br><br>  
  
<label for="height">Height (cm):</label><br>  
<input type="number" step="0.1" id="height" name="height" placeholder="Enter Height" required><br><br>  
  
<label for="gender">Gender:</label><br>  
<select id="gender" name="gender" required>  
    <option value="">Select Gender</option>  
    <option value="male">Male</option>  
    <option value="female">Female</option>  
    <option value="other">Other</option>  
</select><br><br>  
  
<label for="mobile_no">Mobile No:</label><br>  
<input type="tel" id="mobile_no" name="mobile_no" 
placeholder="Enter Mobile No" 
maxlength="10" pattern="[0-9]{10}" required><br><br>

<label for="password">Password:</label><br>  
<input type="password" id="password" name="password" placeholder="Enter Password" required><br><br>  
  
<button type="submit" name="register">Register</button>

</form>
</center>  
</body>  
</html>
